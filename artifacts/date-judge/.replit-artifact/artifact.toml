kind = "web"
previewPath = "/"
title = "The Date Judge"
version = "1.0.0"
id = "artifacts/date-judge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20820

[services.development]
run = "pnpm --filter @workspace/date-judge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/date-judge", "run", "build" ]
publicDir = "artifacts/date-judge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20820"
BASE_PATH = "/"

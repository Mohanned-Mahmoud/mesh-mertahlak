services:
  - type: web
    name: date-judge-frontend
    plan: free
    runtime: node
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm run build:frontend
    startCommand: npx --yes serve -s artifacts/date-judge/dist/public -l $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: https://date-judge-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://date-judge-api.onrender.com

  - type: web
    name: date-judge-api
    plan: free
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/health

services:
  - type: web
    name: date-judge-frontend
    plan: free
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:frontend
    startCommand: npm install -g serve && serve -s artifacts/date-judge/dist/public -l 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: https://date-judge-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://date-judge-api.onrender.com
      - key: PNPM_HOME
        value: /app/.pnpm
      - key: PATH
        value: /app/.pnpm:$PATH

  - type: web
    name: date-judge-api
    plan: free
    runtime: docker
    region: oregon
    dockerfilePath: ./artifacts/api-server/Dockerfile
    dockerContext: ./
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/health

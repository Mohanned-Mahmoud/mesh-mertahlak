services:
  - type: web
    name: mesh-mertahlak
    plan: free
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # المتغيرات دي عشان الفرونت اند وقت البيلد يعرف يكلم الباك اند على نفس الدومين
      - key: VITE_API_BASE_URL
        value: /api
      - key: VITE_SOCKET_URL
        value: /
    healthCheckPath: /api/health